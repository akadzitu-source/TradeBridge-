version: '3.8'\n\nservices:\n  firebase-emulator:\n    image: firebase/emulator-sdk:latest\n    ports:\n      - '4000:4000'     # Firebase UI\n      - '8080:8080'     # Firestore\n      - '9099:9099'     # Authentication\n    volumes:\n      - './firebase:/firebase'\n    entrypoint: ["firebase", "emulators:start", "--project", "your-firebase-project"]\n\n  node-api:\n    build: ./node-api  # Specify the path to your Node.js API Dockerfile\n    volumes:\n      - ./node-api:/usr/src/app\n    ports:\n      - '3000:3000'\n    depends_on:\n      - postgres\n      - redis\n\n  postgres:\n    image: postgres:latest\n    environment:\n      POSTGRES_USER: youruser\n      POSTGRES_PASSWORD: yourpassword\n      POSTGRES_DB: yourdb\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    ports:\n      - '5432:5432'\n\n  pgadmin:\n    image: dpage/pgadmin4:latest\n    environment:\n      PGADMIN_DEFAULT_EMAIL: admin@admin.com\n      PGADMIN_DEFAULT_PASSWORD: admin\n    ports:\n      - '5050:80'\n\n  redis:\n    image: redis:latest\n    ports:\n      - '6379:6379'\n\nvolumes:\n  postgres_data: